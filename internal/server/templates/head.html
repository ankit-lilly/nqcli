{{define "head"}}
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1" />
      <title>SDR Query Runner</title>
      <link rel="dns-prefetch" href="https://unpkg.com" />
      <link rel="preconnect" href="https://unpkg.com" crossorigin />
      <link rel="preconnect" href="https://cdn.tailwindcss.com" crossorigin />
      <script src="https://cdn.tailwindcss.com"></script>
      <script>
        tailwind.config = {
          darkMode: ["selector", '[data-color-scheme="dark"]'],
          theme: {
            extend: {
              colors: {
                background: "hsl(var(--background))",
                foreground: "hsl(var(--foreground))",
                card: "hsl(var(--card))",
                "card-foreground": "hsl(var(--card-foreground))",
                popover: "hsl(var(--popover))",
                "popover-foreground": "hsl(var(--popover-foreground))",
                primary: "hsl(var(--primary))",
                "primary-foreground": "hsl(var(--primary-foreground))",
                secondary: "hsl(var(--secondary))",
                "secondary-foreground": "hsl(var(--secondary-foreground))",
                muted: "hsl(var(--muted))",
                "muted-foreground": "hsl(var(--muted-foreground))",
                accent: "hsl(var(--accent))",
                "accent-foreground": "hsl(var(--accent-foreground))",
                destructive: "hsl(var(--destructive))",
                "destructive-foreground": "hsl(var(--destructive-foreground))",
                border: "hsl(var(--border))",
                input: "hsl(var(--input))",
                ring: "hsl(var(--ring))",
              },
              borderRadius: {
                lg: "var(--radius)",
                md: "calc(var(--radius) - 2px)",
                sm: "calc(var(--radius) - 4px)",
              },
              fontFamily: {
                sans: [
                  "Inter",
                  "Segoe UI",
                  "system-ui",
                  "-apple-system",
                  "BlinkMacSystemFont",
                  "sans-serif",
                ],
                mono: [
                  "JetBrains Mono",
                  "SFMono-Regular",
                  "Consolas",
                  "Liberation Mono",
                  "monospace",
                ],
              },
            },
          },
        };
      </script>
      <link rel="stylesheet" id="codetheme" href="https://unpkg.com/@highlightjs/cdn-assets@11.11.1/styles/github.min.css" />
      <script src="/assets/app.js"></script>
      <link rel="stylesheet" href="/assets/styles.css" fetchpriority="high" />
      <script src="https://unpkg.com/@highlightjs/cdn-assets@11.11.1/highlight.min.js" defer></script>
      <script src="https://unpkg.com/@highlightjs/cdn-assets@11.11.1/languages/groovy.min.js" defer></script>
      <script src="https://unpkg.com/@highlightjs/cdn-assets@11.11.1/languages/json.min.js" defer></script>
      <script src="https://unpkg.com/highlightjs-cypher/dist/cypher.min.js" type="text/javascript" defer></script>
    </head>
{{end}}
