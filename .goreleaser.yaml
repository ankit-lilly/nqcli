version: 2
before:
  hooks:
    - go test ./...

builds:
  - id: nqcli
    main: ./main.go
    binary: nq
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/ankit-lilly/nqcli/cmd.version={{ .Version }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: nqcli-archive
    formats: 
     - tar.gz
    format_overrides:
      - goos: windows
        formats: 
         - zip
    files:
      - README.md

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
